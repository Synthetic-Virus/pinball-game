# Serves the web demo over HTTP (8080) and self-signed HTTPS (443).
# Godot 4 web needs a secure context (HTTPS or localhost), so HTTPS is the one that actually runs.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
}

server {
    listen 443 ssl;
    server_name _;
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    root /usr/share/nginx/html;
    index index.html;
}
