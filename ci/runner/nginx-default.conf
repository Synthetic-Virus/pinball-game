# Serves the web demo over HTTP (8080) and self-signed HTTPS (443).
# Godot 4 web needs a secure context (HTTPS or localhost), so HTTPS is the one that actually runs.
#
# NO-CACHE (2026-06-22): the demo is a moving prototype; every push should load fresh. Without this,
# the browser HTTP-caches the big .pck/.wasm and the developer kept seeing stale builds ("you changed
# nothing"). There is NO service worker (export PWA disabled), so these headers fully control caching.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }
}

server {
    listen 443 ssl;
    server_name _;
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    root /usr/share/nginx/html;
    index index.html;
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }
}
