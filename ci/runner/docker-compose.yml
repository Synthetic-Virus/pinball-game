# Self-hosted Godot build runner + nginx demo server (HTTP + self-signed HTTPS) + optional Cloudflare tunnel.
services:
  godot-runner:
    build:
      context: .
      args:
        GODOT_VERSION: "4.7"
    image: pinball-godot-runner:local
    container_name: pinball-godot-runner
    restart: unless-stopped
    environment:
      REPO_URL: https://github.com/Synthetic-Virus/pinball-game
      RUNNER_NAME: pinball-godot-runner
      RUNNER_TOKEN: ${RUNNER_TOKEN:-}
      ACCESS_TOKEN: ${ACCESS_TOKEN:-}
      LABELS: self-hosted,godot
      RUNNER_SCOPE: repo
      RUNNER_WORKDIR: /tmp/runner/work
    volumes:
      - runner-work:/tmp/runner/work
      - /srv/www/pinball-demo:/demo-web

  demo-web:
    image: nginx:stable
    container_name: pinball-demo-web
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - /srv/www/pinball-demo:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro
      - ./nginx-default.conf:/etc/nginx/conf.d/default.conf:ro

  cloudflared:
    image: cloudflare/cloudflared:2026.6.0
    container_name: pinball-cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN:-}

volumes:
  runner-work:
